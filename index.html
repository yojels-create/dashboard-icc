<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICC Trazo Vial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#e8edf5;--text2:#8892a4;--text3:#4a5568;--accent:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-size:14px;font-weight:600;letter-spacing:.02em}
.logo span{font-size:11px;color:var(--text2);font-weight:300;margin-left:8px;font-family:'IBM Plex Mono',monospace}
.pill{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:4px 12px;font-size:11px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.dot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot.err{background:var(--red)}
.dot.spin{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.cfg{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 1.5rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cfg label{font-size:10px;color:var(--text2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.cfg input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 9px;outline:none}
.cfg input:focus{border-color:var(--accent)}
#sid{width:330px}
#sname{width:100px}
.btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{background:var(--bg3);border-color:var(--accent);color:#60a5fa}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.btn.pri:hover{background:#2563eb}
.btn.go{background:var(--green);border-color:var(--green);color:#052e16}
.sp{flex:1}
.ts{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.alert{margin:.75rem 1.5rem 0;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.6;border:1px solid;display:none}
.alert.show{display:block}
.aw{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#fbbf24}
.ai{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.25);color:#93c5fd}
.as{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:#6ee7b7}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:1.25rem 1.5rem 0}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.kpi.g::before{background:var(--green)}.kpi.a::before{background:var(--amber)}.kpi.o::before{background:var(--orange)}
.kl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);font-family:'IBM Plex Mono',monospace;margin-bottom:6px}
.kv{font-size:24px;font-weight:300;font-family:'IBM Plex Mono',monospace}
.ks{font-size:10px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.tabs{display:flex;padding:1.25rem 1.5rem 0;border-bottom:1px solid var(--border)}
.tab{padding:7px 18px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.on{color:#60a5fa;border-bottom-color:var(--accent)}
.panel{display:none;padding:1.25rem 1.5rem}
.panel.on{display:block}
.mapbox{border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative}
#map{height:440px;width:100%}
.leg{position:absolute;bottom:14px;left:14px;background:rgba(10,12,18,.92);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:11px;z-index:1000}
.lr{display:flex;align-items:center;gap:7px;color:var(--text2);margin-bottom:4px}
.lr:last-child{margin:0}
.ld{width:8px;height:8px;border-radius:50%}
.ll{width:18px;height:2px;border-radius:1px}
.mi{font-size:11px;color:var(--text3);text-align:right;margin-top:6px;font-family:'IBM Plex Mono',monospace}
.tctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ttl{font-size:13px;font-weight:500}
.srch{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:12px;color:var(--text);width:200px;outline:none}
.srch:focus{border-color:var(--accent)}
.twrap{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tscroll{overflow-x:auto;max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:5}
th{background:var(--bg3);padding:8px 12px;text-align:left;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
.foot{padding:.75rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">ICC Trazo Vial <span>Dashboard · Tiempo real</span></div>
  <div class="pill"><div class="dot spin" id="dot"></div><span id="stxt">Iniciando...</span></div>
</div>
<div class="cfg">
  <label>Sheet ID:</label>
  <input id="sid" value="1gyqABGJ4BL6HMBuZ3JrUZS0zC5sG6IUApdTzOOe32pU"/>
  <label>Hoja:</label>
  <input id="sname" value="Trazo"/>
  <button class="btn pri" onclick="load()">&#8635; Cargar</button>
  <button class="btn" id="abtn" onclick="toggleAuto()">Auto 30s</button>
  <div class="sp"></div>
  <span class="ts" id="ts"></span>
</div>
<div class="alert aw" id="alert"></div>
<div class="kpis">
  <div class="kpi"><div class="kl">Total puntos</div><div class="kv" id="k1">—</div><div class="ks">registros</div></div>
  <div class="kpi g"><div class="kl">Longitud</div><div class="kv" id="k2">—</div><div class="ks">km de trazo</div></div>
  <div class="kpi a"><div class="kl">Inicio</div><div class="kv" id="k3">—</div><div class="ks">progresiva km</div></div>
  <div class="kpi o"><div class="kl">Fin</div><div class="kv" id="k4">—</div><div class="ks">progresiva km</div></div>
  <div class="kpi"><div class="kl">Columnas</div><div class="kv" id="k5">—</div><div class="ks">campos</div></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="tab('mapa',this)">Mapa de trazo</button>
  <button class="tab" onclick="tab('tabla',this)">Tabla de datos</button>
</div>
<div class="panel on" id="panel-mapa">
  <div class="mapbox">
    <div id="map"></div>
    <div class="leg">
      <div class="lr"><span class="ld" style="background:#f97316"></span>Inicio/Fin</div>
      <div class="lr"><span class="ld" style="background:#3b82f6"></span>Progresiva</div>
      <div class="lr"><span class="ll" style="background:#3b82f6"></span>Trazo</div>
    </div>
  </div>
  <div class="mi" id="mi"></div>
</div>
<div class="panel" id="panel-tabla">
  <div class="tctrl">
    <span class="ttl" id="ttl">Datos</span>
    <input class="srch" placeholder="Buscar..." oninput="search(this.value)"/>
  </div>
  <div class="twrap"><div class="tscroll"><table><thead id="th"></thead><tbody id="tb"></tbody></table></div></div>
</div>
<div class="foot"><span>ICC Trazo Vial</span><span id="fi">Sin datos</span></div>

<script>
const SHEET_ID = '1gyqABGJ4BL6HMBuZ3JrUZS0zC5sG6IUApdTzOOe32pU';
let map, rows=[], heads=[], marks=[], line=null, timer=null;

function initMap(){
  if(map) return;
  map = L.map('map').setView([-7.16,-78.51],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(map);
}

function st(state,msg){
  document.getElementById('dot').className='dot '+(state==='ok'?'on':state==='err'?'err':'spin');
  document.getElementById('stxt').textContent=msg;
}
function alert_(msg,t='w'){
  const el=document.getElementById('alert');
  el.className='alert show a'+t;
  el.innerHTML=msg;
}
function clearAlert(){document.getElementById('alert').className='alert';}

function load(){
  const id=document.getElementById('sid').value.trim();
  const sh=document.getElementById('sname').value.trim()||'Trazo';
  st('load','Conectando...');
  
  // Usar fetch con URL CSV pública — método más compatible
  const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sh)}&t=${Date.now()}`;
  
  fetch(url, {mode:'cors'})
    .then(r=>{
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(txt=>{
      if(txt.includes('<!DOCTYPE')||txt.includes('<html')||txt.length<5) throw new Error('Sheet privado o vacío');
      parse(txt);
      clearAlert();
      st('ok','Conectado · Google Sheets');
      const now=new Date().toLocaleString('es-PE');
      document.getElementById('ts').textContent='Actualizado: '+now;
      document.getElementById('fi').textContent='Última actualización: '+now;
    })
    .catch(e=>{
      st('err','Sin conexión');
      alert_(`<b>⚠ No se pudo conectar.</b> ${e.message}<br><br>
      Verifica: <b>1)</b> Sheet público (Compartir → Cualquier persona → Lector) &nbsp;
      <b>2)</b> Nombre de hoja correcto (pestaña en la parte inferior del Sheet)`);
    });
}

function csvLine(line){
  const cols=[]; let cur='',inq=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inq=!inq;}
    else if(c===','&&!inq){cols.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  cols.push(cur.trim());
  return cols;
}

function parse(txt){
  const lines=txt.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2){alert_('El sheet tiene menos de 2 filas.');return;}
  heads=csvLine(lines[0]);
  rows=lines.slice(1).map(csvLine).filter(r=>r.some(c=>c));
  kpis(); tbl(); renderMap();
}

function col(...terms){
  for(const t of terms){
    const i=heads.findIndex(h=>h.toLowerCase().replace(/[\s_]/g,'').includes(t.toLowerCase()));
    if(i>=0) return i;
  }
  return -1;
}

function kpis(){
  document.getElementById('k1').textContent=rows.length;
  document.getElementById('k5').textContent=heads.length;
  const pi=col('progresiva','prog','km','pk','station','estacion');
  if(pi>=0){
    const ns=rows.map(r=>parseFloat(r[pi])).filter(v=>!isNaN(v));
    if(ns.length){
      const mn=Math.min(...ns),mx=Math.max(...ns);
      document.getElementById('k2').textContent=(mx-mn).toFixed(3);
      document.getElementById('k3').textContent=mn.toFixed(3);
      document.getElementById('k4').textContent=mx.toFixed(3);
    }
  }
}

function tbl(){ buildTbl(rows); }

function buildTbl(data){
  document.getElementById('th').innerHTML='<tr>'+heads.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  document.getElementById('tb').innerHTML=data.slice(0,500).map(r=>
    '<tr>'+r.map((c,i)=>`<td>${fmt(c,heads[i]||'')}</td>`).join('')+'</tr>'
  ).join('');
  document.getElementById('ttl').textContent=`${data.length} filas · ${heads.length} columnas`;
}

function fmt(v,h){
  if(!v||v===''||v==='-') return `<span style="color:var(--text3)">—</span>`;
  return v;
}

function search(q){
  if(!q){buildTbl(rows);return;}
  buildTbl(rows.filter(r=>r.join(' ').toLowerCase().includes(q.toLowerCase())));
}

function renderMap(){
  initMap();
  marks.forEach(m=>m.remove()); marks=[];
  if(line){line.remove();line=null;}

  // Detectar columnas de coordenadas
  const latI=col('lat','latitud','latitude');
  const lngI=col('lon','lng','longitud','longitude');
  // También intentar con Norte/Este (UTM)
  const norI=col('norte','north','northing','y');
  const estI=col('este','east','easting','x');
  const prI=col('progresiva','prog','km','pk','station');
  const dI=col('desc','nombre','tramo','observ','detalle','ubicacion');

  let useLat = latI>=0 && lngI>=0;
  let pts=[];

  if(useLat){
    rows.forEach((r,i)=>{
      const la=parseFloat(r[latI]), ln=parseFloat(r[lngI]);
      if(isNaN(la)||isNaN(ln)) return;
      pts.push({lat:la,lng:ln,prog:prI>=0?r[prI]:`P${i+1}`,desc:dI>=0?r[dI]:'',idx:i});
    });
  }

  if(pts.length===0){
    document.getElementById('mi').textContent=
      'No se encontraron columnas Latitud/Longitud. Agrega columnas "Latitud" y "Longitud" a tu Sheet para ver el mapa.';
    map.setView([-7.16,-78.51],9);
    return;
  }

  const lls=pts.map(p=>[p.lat,p.lng]);
  pts.forEach((p,i)=>{
    const isEnd=i===0||i===pts.length-1;
    const m=L.circleMarker([p.lat,p.lng],{
      radius:isEnd?9:5,fillColor:isEnd?'#f97316':'#3b82f6',
      color:'#fff',weight:2,fillOpacity:1
    }).bindPopup(`<b style="color:#1e40af">KM ${p.prog}</b>${p.desc?`<br><small>${p.desc}</small>`:''}<br><small style="color:#6b7280">Lat:${p.lat.toFixed(6)} Lng:${p.lng.toFixed(6)}</small>`)
    .addTo(map);
    marks.push(m);
  });

  line=L.polyline(lls,{color:'#3b82f6',weight:3,opacity:.8}).addTo(map);
  map.fitBounds(line.getBounds(),{padding:[25,25]});
  document.getElementById('mi').textContent=`${pts.length} puntos · Clic en cada punto para detalles`;
}

function tab(name,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  if(name==='mapa') setTimeout(()=>map&&map.invalidateSize(),100);
}

function toggleAuto(){
  const b=document.getElementById('abtn');
  if(timer){clearInterval(timer);timer=null;b.textContent='Auto 30s';b.className='btn';}
  else{load();timer=setInterval(load,30000);b.textContent='⏸ Detener';b.className='btn go';}
}

initMap();
load();
</script>
</body>
</html>
